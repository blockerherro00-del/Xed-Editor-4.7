name: Extract Xed-Editor

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract zip file
        run: |
          unzip -q Xed-Editor-3.2.7.zip

      - name: Commit and push (ignore workflows)
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"

          # Add সব file কিন্তু .github/workflows ignore করবে
          git add . ':!.github/workflows/*'

          # Check যদি কোনো change থাকে
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Extract Xed-Editor-3.2.7.zip"
            git push
          fi
