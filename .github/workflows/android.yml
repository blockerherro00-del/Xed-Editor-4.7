name: Android CI

on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

jobs:
  build-release:
    name: Build Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # ✅ Checkout with submodules (FIXED)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      # ✅ Setup Java
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      # ✅ Extra Gradle cache (optional but faster)
      - name: Cache Gradle Build Files
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ✅ Decode secrets
      - name: Decode and create secrets
        run: |
          echo "${{ secrets.KEYSTORE }}" | base64 -d > /tmp/xed.keystore
          echo "${{ secrets.PROP }}" | base64 -d > /tmp/signing.properties

      # ✅ Gradle permission
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ✅ Commit hash
      - name: Set Commit Hash
        run: echo "COMMIT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      # ✅ Build APK
      - name: Build with Gradle
        run: |
          ./gradlew assembleRelease --no-daemon
          mv app/build/outputs/apk/release/*.apk app/xed-editor-${{ env.COMMIT_HASH }}.apk
        env:
          KEYSTORE_FILE: /tmp/xed.keystore
          SIGNING_PROPERTIES_FILE: /tmp/signing.properties
          GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs="-Xmx2g"

      # ✅ Upload artifact
      - name: Archive APK
        uses: actions/upload-artifact@v4
        with:
          name: Xed-Editor-Release
          path: app/xed-editor-${{ env.COMMIT_HASH }}.apk

      # ✅ Cleanup secrets
      - name: Delete secrets
        run: rm -f /tmp/xed.keystore /tmp/signing.properties

      # ✅ Send to Telegram
      - name: Send APK to Telegram
        if: ${{ success() && github.event.head_commit.message != '' }}
        run: |
          CAPTION=$(jq -R . <<< "${{ github.event.head_commit.message }}")
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendDocument" \
          -F chat_id="-1002408175863" \
          -F message_thread_id="582" \
          -F caption="$CAPTION" \
          -F document=@"app/xed-editor-${{ env.COMMIT_HASH }}.apk"

      # ✅ Build Plugin SDK
      - name: Generate Plugin Sdk
        run: bash plugin-sdk/build-auto.sh

      # ✅ Update GitHub Release
      - name: Update Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "plugin-sdk/output/sdk.jar"
          tag: "sdk-latest"
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: false
          name: "Latest Plugin SDK Build"
          body: "This release is automatically updated with the latest sdk.jar."
          token: ${{ secrets.GITHUB_TOKEN }}
